<title>Onboarding Dashboard</title>
<style>
:root {
  --primary:      var(--sb-brand, #2563eb);
  --primary-soft: rgba(37,99,235,0.10);
  --success:      #10b981;
  --success-soft: #ecfdf5;
  --warning:      #f59e0b;
  --warning-soft: #fffbeb;
  --danger:       #ef4444;
  --danger-soft:  rgba(239,68,68,0.08);
  --text:         #111827;
  --text-light:   #6b7280;
  --bg:           #f3f6fb;
  --surface:      #ffffff;
  --surface-alt:  #f8fafc;
  --border:       #dbe3ef;
  --shadow:       0 4px 24px rgba(15,23,42,0.08);
  --radius:       18px;
  --radius-sm:    10px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --primary:      var(--sb-brand, #60a5fa);
    --primary-soft: rgba(96,165,250,0.15);
    --success:      #34d399;
    --success-soft: #0b1f19;
    --warning:      #fbbf24;
    --warning-soft: #1c1307;
    --danger:       #f87171;
    --danger-soft:  rgba(248,113,113,0.12);
    --text:         #f8fafc;
    --text-light:   #94a3b8;
    --bg:           #0f172a;
    --surface:      #111c31;
    --surface-alt:  #17243b;
    --border:       #24324a;
    --shadow:       0 4px 24px rgba(2,6,23,0.35);
  }
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: radial-gradient(circle at top left, rgba(37,99,235,0.08), transparent 30%),
              radial-gradient(circle at top right, rgba(14,165,233,0.06), transparent 25%),
              var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
}
body { padding: 20px; }
.cw { width: 100%; max-width: 1320px; margin: 0 auto; }

/* ── TOPBAR ── */
.topbar { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 20px; }
.topbar-left h1 { font-size: clamp(22px, 3vw, 38px); font-weight: 800; letter-spacing: -0.03em; line-height: 1; }
.topbar-left .sub { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; margin-top: 10px; color: var(--text-light); font-size: 14px; font-weight: 600; }
.source-badge { display: inline-flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: 50%; background: linear-gradient(135deg, #0ea5e9, #2563eb); color: #fff; font-size: 8px; font-weight: 800; letter-spacing: .04em; }
.divider { width: 1px; height: 18px; background: var(--border); }
.topbar-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.select-wrap { display: inline-flex; align-items: center; gap: 8px; min-height: 44px; padding: 0 14px; border: 1px solid var(--border); border-radius: 12px; background: rgba(255,255,255,0.75); backdrop-filter: blur(8px); color: var(--text); }
@media (prefers-color-scheme: dark) { .select-wrap { background: rgba(17,28,49,0.85); } }
.select-wrap select { appearance: none; border: none; outline: none; background: transparent; color: inherit; font: inherit; font-size: 14px; font-weight: 600; cursor: pointer; padding-right: 14px; }
.select-wrap svg { flex-shrink: 0; color: var(--text-light); }

/* ── KPI CARDS ── */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
@media (max-width: 900px) { .kpi-grid { grid-template-columns: 1fr 1fr; } }
@media (max-width: 500px) { .kpi-grid { grid-template-columns: 1fr; } }
.kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
.kpi-label { font-size: 13px; font-weight: 700; color: var(--text-light); margin-bottom: 10px; }
.kpi-value { font-size: clamp(28px, 3vw, 42px); font-weight: 800; letter-spacing: -0.04em; line-height: 1; }
.kpi-sub { margin-top: 8px; font-size: 13px; font-weight: 700; color: var(--text-light); }
.kpi-trend { display: inline-flex; align-items: center; gap: 4px; font-weight: 800; font-size: 13px; }
.kpi-trend.up { color: var(--success); }
.kpi-trend.warn { color: var(--warning); }
.kpi-trend.danger { color: var(--danger); }
.kpi-icon { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.kpi-icon svg { width: 22px; height: 22px; }
.kpi-icon.blue   { background: rgba(37,99,235,0.12); color: var(--primary); }
.kpi-icon.green  { background: rgba(16,185,129,0.12); color: var(--success); }
.kpi-icon.amber  { background: rgba(245,158,11,0.12); color: var(--warning); }
.kpi-icon.red    { background: rgba(239,68,68,0.12); color: var(--danger); }

/* ── FILTER TABS ── */
.filter-row { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-chip { display: inline-flex; align-items: center; gap: 6px; padding: 8px 14px; border-radius: 99px; border: 1px solid var(--border); background: var(--surface); color: var(--text-light); font-size: 13px; font-weight: 700; cursor: pointer; transition: all .18s; font-family: inherit; }
.filter-chip:hover { border-color: var(--primary); color: var(--primary); }
.filter-chip.active { background: var(--primary); border-color: var(--primary); color: #fff; }
.filter-chip .dot { width: 8px; height: 8px; border-radius: 50%; }

/* ── TABLE CARD ── */
.table-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; margin-bottom: 16px; }
.table-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 18px 22px; border-bottom: 1px solid var(--border); }
.table-head h2 { font-size: 16px; font-weight: 800; }
.table-count { font-size: 13px; font-weight: 700; color: var(--text-light); }
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; min-width: 700px; }
th { padding: 12px 14px; text-align: left; font-size: 12px; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: .06em; border-bottom: 1px solid var(--border); background: var(--surface-alt); }
td { padding: 14px 14px; border-bottom: 1px solid var(--border); font-size: 14px; font-weight: 600; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--surface-alt); }

/* Employee cell */
.emp-cell { display: flex; align-items: center; gap: 10px; }
.emp-av { width: 36px; height: 36px; border-radius: 10px; background: linear-gradient(135deg, var(--primary), #60a5fa); color: #fff; font-size: 12px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.emp-name { font-size: 14px; font-weight: 700; }
.emp-role { font-size: 12px; color: var(--text-light); font-weight: 600; }

/* Phase badge */
.phase-badge { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 99px; font-size: 12px; font-weight: 700; white-space: nowrap; }
.phase-badge.preboarding { background: rgba(245,158,11,0.12); color: #b45309; }
.phase-badge.onboarding  { background: rgba(37,99,235,0.12); color: var(--primary); }
.phase-badge.completed   { background: rgba(16,185,129,0.12); color: var(--success); }
.phase-badge.at-risk     { background: rgba(239,68,68,0.10); color: var(--danger); }
.phase-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

/* Progress bar */
.prog-wrap { min-width: 110px; }
.prog-bar-bg { height: 7px; background: var(--surface-alt); border-radius: 4px; overflow: hidden; border: 1px solid var(--border); margin-bottom: 4px; }
.prog-bar-fill { height: 100%; border-radius: 4px; transition: width .4s ease; }
.prog-label { font-size: 11px; font-weight: 700; color: var(--text-light); }

/* Day badge */
.day-badge { display: inline-block; padding: 3px 9px; border-radius: 6px; font-size: 12px; font-weight: 700; }
.day-badge.future  { background: var(--primary-soft); color: var(--primary); }
.day-badge.today   { background: rgba(16,185,129,0.12); color: var(--success); }
.day-badge.past    { background: var(--surface-alt); color: var(--text-light); }

/* Steps completed */
.steps-cell { font-size: 13px; font-weight: 700; }
.steps-cell .frac { color: var(--text-light); font-weight: 600; }

/* Action btn */
.action-btn { padding: 6px 12px; border-radius: 7px; border: 1px solid var(--border); background: var(--surface); color: var(--primary); font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; transition: background .15s, border-color .15s; white-space: nowrap; }
.action-btn:hover { background: var(--primary-soft); border-color: var(--primary); }

/* ── DETAIL PANEL ── */
.detail-panel { display: none; background: var(--surface-alt); border-top: 1px solid var(--border); padding: 16px 22px; }
.detail-panel.open { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; }
.detail-item { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; }
.detail-item-label { font-size: 10px; font-weight: 700; color: var(--text-light); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
.detail-item-val { font-size: 14px; font-weight: 700; color: var(--text); }
.step-list { list-style: none; display: flex; flex-direction: column; gap: 6px; }
.step-list li { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text); font-weight: 600; }
.step-check { width: 18px; height: 18px; border-radius: 5px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 10px; }
.step-check.done   { background: var(--success); color: #fff; }
.step-check.pending{ background: var(--surface-alt); border: 1.5px solid var(--border); color: var(--text-light); }

/* ── INSIGHTS ROW ── */
.insights-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
@media (max-width: 900px) { .insights-grid { grid-template-columns: 1fr; } }
.insight-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); padding: 18px 20px; display: flex; align-items: flex-start; gap: 14px; }
.insight-icon { width: 40px; height: 40px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.insight-icon svg { width: 18px; height: 18px; }
.insight-icon.warn   { background: rgba(245,158,11,0.12); color: var(--warning); }
.insight-icon.danger { background: rgba(239,68,68,0.10); color: var(--danger); }
.insight-icon.ok     { background: rgba(16,185,129,0.12); color: var(--success); }
.insight-title { font-size: 14px; font-weight: 800; margin-bottom: 3px; }
.insight-copy  { font-size: 13px; color: var(--text-light); line-height: 1.5; }

/* ── NOTIFICATION ALERT ── */
.notif-alert { background: var(--warning-soft); border: 1px solid rgba(245,158,11,0.3); border-left: 3px solid var(--warning); border-radius: var(--radius-sm); padding: 10px 12px; margin-top: 10px; }
.notif-alert-top { display: flex; align-items: center; gap: 7px; margin-bottom: 8px; }
.notif-alert-icon { font-size: 14px; flex-shrink: 0; }
.notif-alert-label { font-size: 12px; font-weight: 700; color: #92400e; line-height: 1.3; }
.notif-alert-ts { font-size: 11px; color: var(--text-light); margin-top: 2px; }
.notif-resend-btn { display: block; width: 100%; padding: 7px 10px; border-radius: 7px; border: 1px solid rgba(245,158,11,0.4); background: #fff; color: #b45309; font-size: 12px; font-weight: 700; cursor: pointer; font-family: inherit; transition: background .15s, border-color .15s; text-align: center; }
.notif-resend-btn:hover { background: var(--warning-soft); border-color: var(--warning); }
.notif-resend-btn.sent { background: var(--success-soft); border-color: rgba(16,185,129,0.3); color: var(--success); cursor: default; } margin-top: 16px; font-size: 12px; color: var(--text-light); font-weight: 600; }

/* ── RESPONSIVE ── */
@media (max-width: 680px) {
  body { padding: 12px; }
  .kpi-value { font-size: 26px; }
  .topbar { flex-direction: column; }
}
</style>

function applySBBrand() {
  const sb = getComputedStyle(document.documentElement).getPropertyValue('--sb-brand').trim();
  if (sb) { document.documentElement.style.setProperty('--primary', sb); return; }
  try {
    const sb2 = window.parent.getComputedStyle(window.parent.document.documentElement).getPropertyValue('--sb-brand').trim();
    if (sb2) document.documentElement.style.setProperty('--primary', sb2);
  } catch(e) {}
}

// ── Helpers ───────────────────────────────────────────────────────────────
function phaseBadgeHtml(phase) {
  const labels = { preboarding: t.preboarding, onboarding: t.onboarding, completed: t.completed, 'at-risk': t.atRisk };
  return `<span class="phase-badge ${phase}"><span class="dot"></span>${labels[phase] || phase}</span>`;
}

function progressColor(pct) {
  if (pct >= 80) return 'var(--success)';
  if (pct >= 40) return 'var(--primary)';
  if (pct > 0)   return 'var(--warning)';
  return 'var(--border)';
}

function overallProgress(e) {
  if (e.phase === 'preboarding') return e.prebProgress;
  if (e.phase === 'completed')   return 100;
  return Math.round((e.prebProgress + e.onbProgress) / 2);
}

function startDateBadge(e) {
  const diff = Math.round((e.startDate - now) / 86400000);
  if (diff > 0)  return `<span class="day-badge future">${diff === 1 ? t.today.replace('Hoy','Mañana').replace('Today','Tomorrow') : dtFmt(e.startDate)}</span>`;
  if (diff === 0) return `<span class="day-badge today">${t.today}</span>`;
  return `<span class="day-badge past">${dtFmt(e.startDate)}</span>`;
}

function stepsCount(e) {
  const prebDone = e.prebSteps.filter(Boolean).length;
  const onbDone  = e.onbSteps.filter(Boolean).length;
  const total = e.prebSteps.length + e.onbSteps.length;
  return { done: prebDone + onbDone, total };
}

// ── KPI data ─────────────────────────────────────────────────────────────
function kpiData() {
  const all = EMPLOYEES;
  const onTrack  = all.filter(e => e.phase === 'onboarding' || e.phase === 'completed').length;
  const atRisk   = all.filter(e => e.phase === 'at-risk' || e.phase === 'preboarding' && overallProgress(e) < 30).length;
  const avgProg  = Math.round(all.reduce((s,e) => s + overallProgress(e), 0) / all.length);
  return { total: all.length, onTrack, atRisk, avgProg };
}
